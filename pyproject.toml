[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pt-evals"
version = "0.3.0"
description = "Local Python experiment framework for OpenAI Responses API evals."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "openai>=1.68.0",
  "pydantic>=2.7.0",
  "python-dotenv>=1.0.0",
  "rich>=13.7.0",
  "tenacity>=8.2.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0.0",
]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
